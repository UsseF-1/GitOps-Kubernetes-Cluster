{{- if .Values.vote.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vote-hpa
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "voting-app.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vote-db
  minReplicas: {{ .Values.vote.hpa.minReplicas }}
  maxReplicas: {{ .Values.vote.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.vote.hpa.targetCPUUtilizationPercentage }}
{{- end }}
