apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-db
  namespace: default
  labels:
    helm.sh/chart: voting-app-1.0.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: voting-app
    app.kubernetes.io/version: "V1.0"
    app: redis
spec:
