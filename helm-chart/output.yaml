# Source: voting-app/templates/deployments/db-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deploy
  namespace: default
  labels:
    helm.sh/chart: voting-app-1.0.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: voting-app
    app.kubernetes.io/version: "V1.0"
    app: db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        helm.sh/chart: voting-app-1.0.0
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/instance: voting-app
        app.kubernetes.io/version: "V1.0"
        app: db
    spec:
      containers:
        - name: db
          image: postgres:15-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: db-port
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: config-map
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: config-map
                  key: POSTGRES_DB
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: secret
                  key: POSTGRES_PASSWORD
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            exec:
              command:
              - pg_isready
              - -U
              - postgres
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
              - pg_isready
              - -U
              - postgres
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: pvc-db
---
