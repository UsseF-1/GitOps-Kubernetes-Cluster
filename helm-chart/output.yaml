apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voting-app-ingress
  namespace: default
  labels:
    helm.sh/chart: voting-app-1.0.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: voting-app
    app.kubernetes.io/version: "V1.0"
spec:
  ingressClassName: nginx
  rules:
    -
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: svc-vote
                port:
                  number: 80
          - path: /result
            pathType: Prefix
            backend:
              service:
                name: svc-result
                port:
                  number: 4000
