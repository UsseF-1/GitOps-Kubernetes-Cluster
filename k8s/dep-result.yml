apiVersion: apps/v1
kind: Deployment
metadata:
  name: result-db
  labels:
    app: result

spec:
  replicas: 1
  selector:
    matchLabels:
      app: result

  template:
    metadata:
      labels:
        app: result

    spec:
      containers:
      - name: result
        image: 569033310103.dkr.ecr.us-east-1.amazonaws.com/voting-app-result:V1.0

        ports:
        - containerPort: 4000
          name: result-port

        env:
          - name: POSTGRES_HOST
            valueFrom:
              configMapKeyRef:
                name: config-map
                key: POSTGRES_HOST

          - name: POSTGRES_USER
            valueFrom:
              configMapKeyRef:
                name: config-map
                key: POSTGRES_USER

          - name: POSTGRES_DB
            valueFrom:
              configMapKeyRef:
                name: config-map
                key: POSTGRES_DB

          - name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: secret
                key: POSTGRES_PASSWORD